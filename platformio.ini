; ESP32 Weather Station – PlatformIO configuration
; Board: ESP32 WROOM (esp32dev)
; Display: Waveshare 4.2" 400×300 e-paper (Rev 2.1, GDEW042T2)
; Sensor: DHT11

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; Partition scheme with enough NVS headroom for 365 trend records
board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_LOOP_STACK_SIZE=16384
    -I${PROJECT_DIR}

lib_deps =
    ; E-paper display (Waveshare 4.2" B/W via GxEPD2)
    zinggjm/GxEPD2 @ ^1.6.0

    ; ArduinoJson v7 for Open-Meteo payload parsing
    bblanchon/ArduinoJson @ ^7.0.0

    ; DHT11/22 sensor
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

    ; HTTPClient and WiFiClientSecure are bundled with esp32 platform
